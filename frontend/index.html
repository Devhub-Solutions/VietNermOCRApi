<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VietNerm OCR Demo</title>
    <style>
      body { font-family: Arial, sans-serif; margin: 2rem; max-width: 980px; }
      .row { margin-bottom: 1rem; }
      textarea { width: 100%; min-height: 120px; }
      pre { background: #f4f4f4; padding: 1rem; border-radius: 8px; overflow: auto; }
      #events li { margin: 0.4rem 0; }
    </style>
  </head>
  <body>
    <h1>VietNerm OCR + NER Demo</h1>

    <div class="row">
      <label>Backend URL:</label>
      <input id="apiUrl" value="http://localhost:8000" size="40" />
    </div>

    <div class="row">
      <label><input type="radio" name="mode" value="file" checked /> Multipart file</label>
      <label><input type="radio" name="mode" value="base64" /> JSON base64</label>
      <label><input type="radio" name="mode" value="url" /> JSON image_url</label>
    </div>

    <div class="row">
      <input id="fileInput" type="file" accept="image/*,.pdf" />
    </div>

    <div class="row">
      <textarea id="base64Input" placeholder="Dán base64 hoặc data:image/...;base64,..."></textarea>
    </div>

    <div class="row">
      <input id="urlInput" size="80" placeholder="https://.../document.jpg" />
    </div>

    <div class="row">
      <button id="uploadBtn">Run Streaming OCR</button>
    </div>

    <h3>Progress</h3>
    <ul id="events"></ul>

    <h3>Result</h3>
    <pre id="result">{}</pre>

    <script src="https://cdn.socket.io/4.8.1/socket.io.min.js"></script>
    <script>
      const uploadBtn = document.getElementById('uploadBtn');
      const fileInput = document.getElementById('fileInput');
      const base64Input = document.getElementById('base64Input');
      const urlInput = document.getElementById('urlInput');
      const events = document.getElementById('events');
      const result = document.getElementById('result');

      const addEvent = (message) => {
        const li = document.createElement('li');
        li.textContent = message;
        events.appendChild(li);
      };

      const selectedMode = () => document.querySelector('input[name="mode"]:checked').value;

      uploadBtn.addEventListener('click', async () => {
        events.innerHTML = '';
        result.textContent = '{}';

        const apiUrl = document.getElementById('apiUrl').value.replace(/\/$/, '');
        const mode = selectedMode();
        const socket = io(apiUrl, { transports: ['websocket'] });

        socket.on('connect', async () => {
          addEvent(`Socket connected: ${socket.id}`);

          if (mode === 'file') {
            const file = fileInput.files[0];
            if (!file) {
              addEvent('Please select a file first.');
              socket.disconnect();
              return;
            }

            const formData = new FormData();
            formData.append('file', file);
            formData.append('session_id', socket.id);

            await fetch(`${apiUrl}/api/ocr/stream`, { method: 'POST', body: formData });
          } else {
            const payload = {
              image_base64: mode === 'base64' ? base64Input.value.trim() : null,
              image_url: mode === 'url' ? urlInput.value.trim() : null,
              session_id: socket.id,
            };

            await fetch(`${apiUrl}/api/ocr/json`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(payload),
            });
          }
        });

        socket.on('progress', (payload) => {
          addEvent(`${payload.step}${payload.progress ? ` (${payload.progress}%)` : ''}`);
        });

        socket.on('result', (payload) => {
          addEvent('Result event received');
          result.textContent = JSON.stringify(payload, null, 2);
          socket.disconnect();
        });
      });
    </script>
  </body>
</html>
